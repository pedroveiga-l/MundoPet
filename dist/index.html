<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Pet</title>

    <link rel="icon" href="src/assets/Dog-Duotone--Streamline-Phosphor.svg">

    <!-- FONTES -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
<link rel="icon" href="Dog-Duotone--Streamline-Phosphor.svg"><script defer src="main.js"></script></head>

<body>
    <div id="appName">
        <img src="src/assets/Frame 48095946.svg" alt="">
    </div>

    <div id="agenda">
        <header>
            <div class="header-left">
                <h1 class="title">Sua agenda</h1>
                <p class="paragraph-medium">
                    Aqui você pode ver todos os clientes e serviços agendados para hoje.
                </p>
            </div>

            <div class="date-wrapper">
                <img src="src/assets/calendar.svg" class="icon calendar">

                <input type="date" class="dateInput">

                <img src="src/assets/Icon.svg" class="icon arrow">
            </div>
        </header>

        <div id="list">

            <div id="morning" class="horario">
                <div class="header">
                    <img src="src/assets/Sun-Fog--Streamline-Solar.svg" alt="">
                    <p class="label-large">Manhã</p>
                    <p class="label-large2">09h-12h</p>
                </div>

                <div class="linha"></div>

                <!-- <ul class="clients">
                    <li class="li">
                        <span class="info">
                            <span class="hour">9:00</span>
                            <span class="petName">Bolt</span>
                            <span class="proprietary"> / Pedro</span>
                        </span>

                        <span class="description">Banho e tosa</span>
                        <button>Remover agendamento</button>
                    </li>
                </ul> -->
            </div>

            <div id="afternoon" class="horario">
                <div class="header">
                    <img src="src/assets/Cloud-Sun-4--Streamline-Solar.svg" alt="">
                    <p class="label-large">Tarde</p>
                    <p class="label-large2">13h-18h</p>
                </div>

                <div class="linha"></div>

                <!-- <ul class="clients">
                    <li class="li">
                        <span class="info">
                            <span class="hour">9:00</span>
                            <span class="petName">Bolt</span>
                            <span class="proprietary"> / Pedro</span>
                        </span>

                        <span class="description">Banho e tosa</span>
                        <button>Remover agendamento</button>
                    </li>
                </ul> -->
            </div>

            <div id="night" class="horario">
                <div class="header">
                    <img src="src/assets/Moon-Stars--Streamline-Solar.svg" alt="">
                    <p class="label-large">Noite</p>
                    <p class="label-large2">19h-21h</p>
                </div>

                <div class="linha"></div>

                <!-- <ul class="clients">
                    <li class="li">
                        <span class="info">
                            <span class="hour">9:00</span>
                            <span class="petName">Bolt</span>
                            <span class="proprietary"> / Pedro</span>
                        </span>

                        <span class="description">Banho e tosa</span>
                        <button>Remover agendamento</button>
                    </li>
                </ul> -->
            </div>

        </div>
    </div>

    <button id="newAdd" data-modal="modal-1">NOVO AGENDAMENTO</button>

    <dialog id="modal-1">
        <div class="header-modal">
            <div class="header-top">
                <button class="close-modal" data-modal="modal-1">
                    <h1 class="title">Agende um atendimento</h1>
                    <img src="src/assets/Close-Small-Fill--Streamline-Rounded-Fill---Material-Symbols.svg" alt="">
                </button>
            </div>

            <p class="paragraph-medium">
                Preencha os dados do cliente para realizar o agendamento:
            </p>
        </div>


        <form action="" id="form">
            <div class="input-text">
                <p class="label-medium">Nome do tutor</p>

                <div class="input-icon">
                    <img src="src/assets/User--Streamline-Solar.svg" alt="">
                    <input type="text" id="tutorName" placeholder="Nome do tutor" required>
                </div>
            </div>

            <div class="input-text">
                <p class="label-medium">Nome do pet</p>

                <div class="input-icon">
                    <img src="src/assets/Pet-Paw--Streamline-Core.svg" alt="">
                    <input type="text" id="namePet" placeholder="Nome do pet" required>
                </div>

            </div>

            <div class="input-text">
                <p class="label-medium">Telefone</p>

                <div class="input-icon">
                    <img src="src/assets/User--Streamline-Solar.svg" alt="">
                    <input type="tel" id="phone" placeholder="(00) 0 0000-0000" required>
                </div>

            </div>

            <div class="input-text">
                <p class="label-medium">Descrição do serviço</p>
                <textarea id="description-form" class="input-icon" rows="3" placeholder="Banho e tosa"></textarea>
            </div>

            <!-- INPUT DATA -->
            <div class="date-time">
                <div class="field">
                    <p class="label-medium">Data</p>
                    <div class="date-wrapper" id="date-wrapper2">
                        <img src="src/assets/calendar.svg" class="icon">
                        <input type="date" id="dateInput" class="dateInput">
                        <img src="src/assets/Icon.svg" class="icon arrow">
                    </div>
                </div>

                <!-- INPUT HORA -->
                <div class="field">
                    <p class="label-medium">Hora</p>
                    <div class="date-wrapper alt" id="date-wrapper2">
                        <img src="src/assets/Clock-Circle--Streamline-Solar.svg" class="icon">
                        <select name="" id="select">
                            <option value="" id="first" disabled selected hidden>Selecione</option>
                            <!-- <option>9:00</option> -->
                        </select>
                        <img src="src/assets/Icon.svg" class="icon arrow">
                    </div>
                </div>
            </div>

            <button type="submit" id="submitForm">AGENDAR</button>
        </form>
    </dialog>
</body>

</html>
